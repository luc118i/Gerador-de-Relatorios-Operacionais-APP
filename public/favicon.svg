<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Glow roxo neon para o relógio -->
    <filter id="glow-strong" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="b1"/>
      <feGaussianBlur stdDeviation="6"  result="b2"/>
      <feGaussianBlur stdDeviation="3"  result="b3"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b3"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradiente fundo -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1B24"/>
      <stop offset="100%" stop-color="#151420"/>
    </linearGradient>
    <!-- Gradiente documento -->
    <linearGradient id="doc-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E2D3D"/>
      <stop offset="100%" stop-color="#252433"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="108" fill="url(#bg-grad)"/>

  <!-- Sombra suave interna no topo -->
  <rect width="512" height="512" rx="108" fill="url(#bg-grad)" opacity="0.3"/>

  <!-- ── DOCUMENTO ────────────────────────────────────── -->
  <!-- Corpo do documento (com canto dobrado) -->
  <path d="M 138 96 L 288 96 L 344 152 L 344 406
           Q 344 422 328 422 L 138 422
           Q 122 422 122 406 L 122 112
           Q 122 96 138 96 Z"
        fill="url(#doc-grad)" stroke="#3C3B4E" stroke-width="1.5"/>

  <!-- Canto dobrado (dog-ear) -->
  <path d="M 288 96 L 288 152 L 344 152 Z"
        fill="#1E1D2B" stroke="#3C3B4E" stroke-width="1"/>

  <!-- Linhas de texto -->
  <rect x="152" y="192" width="150" height="9" rx="4.5" fill="#3E3D52"/>
  <rect x="152" y="222" width="162" height="9" rx="4.5" fill="#3E3D52"/>
  <rect x="152" y="252" width="144" height="9" rx="4.5" fill="#3E3D52"/>
  <rect x="152" y="282" width="130" height="9" rx="4.5" fill="#3E3D52"/>
  <rect x="152" y="312" width="110" height="9" rx="4.5" fill="#3E3D52"/>

  <!-- Pontos roxos nas linhas (detalhes visuais) -->
  <circle cx="314" cy="222" r="6" fill="#7C3AED" filter="url(#glow-soft)"/>
  <circle cx="298" cy="312" r="6" fill="#6D28D9" filter="url(#glow-soft)"/>

  <!-- ── RELÓGIO (sobreposição direita) ─────────────────── -->

  <!-- Halo externo (glow difuso) -->
  <circle cx="340" cy="306" r="82" fill="none"
          stroke="#7C3AED" stroke-width="2" opacity="0.25" filter="url(#glow-strong)"/>

  <!-- Anel externo neon (brilho principal) -->
  <circle cx="340" cy="306" r="74" fill="none"
          stroke="#8B5CF6" stroke-width="3.5"
          stroke-dasharray="360 100"
          stroke-dashoffset="30"
          filter="url(#glow-strong)"
          opacity="0.9"/>

  <!-- Arco highlight (parte superior direita, mais brilhante) -->
  <path d="M 340 232 A 74 74 0 0 1 414 306"
        fill="none" stroke="#A78BFA" stroke-width="5"
        stroke-linecap="round" filter="url(#glow-strong)"/>

  <!-- Fundo do relógio (círculo escuro) -->
  <circle cx="340" cy="306" r="62" fill="#1A192A"/>

  <!-- Anel interno (borda fina) -->
  <circle cx="340" cy="306" r="62" fill="none"
          stroke="#4C1D95" stroke-width="1.5" opacity="0.6"/>

  <!-- Ponteiro horas -->
  <line x1="340" y1="306" x2="340" y2="268"
        stroke="#A78BFA" stroke-width="5" stroke-linecap="round"/>

  <!-- Ponteiro minutos -->
  <line x1="340" y1="306" x2="368" y2="322"
        stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>

  <!-- Centro do relógio -->
  <circle cx="340" cy="306" r="6" fill="#C4B5FD"/>
  <circle cx="340" cy="306" r="3" fill="#7C3AED"/>
</svg>
